<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Fighter</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" 
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

<!-- Navbar fragment -->
<div th:replace="fragments/navbar :: navbar"></div>

<h2 class="my-4">Create Fighter</h2>

<!-- Fighter Form -->
<form th:action="@{/create-fighter}" th:object="${fighter}" method="post">

    <!-- Name -->
    <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" th:field="*{name}" class="form-control" placeholder="Enter fighter name">
        <div class="text-danger mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
    </div>

    <!-- Health -->
    <div class="mb-3">
        <label class="form-label">Health</label>
        <input type="number" th:field="*{health}" class="form-control" placeholder="1000 - 1500">
        <div class="text-danger mt-1" th:if="${#fields.hasErrors('health')}" th:errors="*{health}"></div>
    </div>

    <!-- Damage -->
    <div class="mb-3">
        <label class="form-label">Damage</label>
        <input type="number" th:field="*{damage}" class="form-control" placeholder="Less than 100">
        <div class="text-danger mt-1" th:if="${#fields.hasErrors('damage')}" th:errors="*{damage}"></div>
    </div>

    <!-- Resistance -->
    <div class="mb-3">
        <label class="form-label">Resistance</label>
        <input type="number" step="0.1" th:field="*{resistance}" class="form-control" placeholder="0.0 - 10.0">
        <div class="text-danger mt-1" th:if="${#fields.hasErrors('resistance')}" th:errors="*{resistance}"></div>
    </div>

    <!-- Submit Button -->
    <button type="submit" class="btn btn-primary">Create Fighter</button>

</form>

<!-- Optional: Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
